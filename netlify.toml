# Netlify configuration
# Drop this in the root of the tcm-site folder before deploying.

[build]
  publish = "."
  functions = "netlify/functions"

# HTML pages: never cache (so content updates appear immediately)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets: cache for an hour, but require revalidation so a fresh
# deploy is picked up without users having to clear cache. We add a ?v=
# query string to asset URLs from the HTML side as the actual cache-bust.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Pretty URLs: serve /hours instead of /hours.html
[[redirects]]
  from = "/today"
  to = "/index.html"
  status = 200
[[redirects]]
  from = "/hours"
  to = "/hours.html"
  status = 200
[[redirects]]
  from = "/elements"
  to = "/elements.html"
  status = 200
[[redirects]]
  from = "/knowledge"
  to = "/knowledge.html"
  status = 200
[[redirects]]
  from = "/practices"
  to = "/practices.html"
  status = 200
[[redirects]]
  from = "/tongue"
  to = "/tongue.html"
  status = 200
[[redirects]]
  from = "/acupuncture"
  to = "/acupuncture.html"
  status = 200
[[redirects]]
  from = "/practitioners"
  to = "/practitioners.html"
